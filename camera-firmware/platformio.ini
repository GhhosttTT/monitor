; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32cam]
platform = espressif32@^3.5.0
board = esp32cam
framework = arduino
monitor_speed = 115200
build_flags = 
	-I${PROJECT_DIR}/include
	-D ESP32=1
	-D ESP32CAM=1
	-D CORE_DEBUG_LEVEL=5
	-I/Users/tangjinhao/.platformio/packages/framework-arduinoespressif32@3.10006.210326/libraries/WiFiClientSecure/src
	-I/Users/tangjinhao/.platformio/packages/framework-arduinoespressif32@3.10006.210326/libraries/WiFi/src
	-std=gnu++17
build_unflags = -std=gnu++11
lib_deps = 
	espressif/esp32-camera@^2.0.0
	tzapu/WiFiManager@^2.0.15
	bblanchon/ArduinoJson@^6.21.3
	me-no-dev/ESPAsyncWebServer@^1.2.3
	me-no-dev/AsyncTCP@^1.1.1
	links2004/WebSockets@^2.4.1
lib_ldf_mode = deep+
; removed lib_extra_dirs — framework libs are built by the core
extra_scripts = pre:extra_script.py
